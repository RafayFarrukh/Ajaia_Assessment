# Render blueprint — deploys the whole product as ONE free web service.
# Express serves both the API and the built React client, so there is no
# second frontend deployment and no cross-domain cookie problem.
#
# DATABASE_URL is intentionally NOT provisioned here: the free Postgres that
# Render can create is deleted after ~30 days, which would kill the demo
# mid-review. Use a free Neon database instead and paste its connection
# string when Render prompts for it. See docs/DEPLOYMENT.md.
services:
  - type: web
    name: ajaia-docs
    runtime: node
    plan: free
    # --include=dev is required: NODE_ENV=production (below) makes npm skip
    # devDependencies by default, but the build needs TypeScript and Vite.
    buildCommand: npm install --include=dev && npx -w server prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Render generates a strong random secret
      - key: DATABASE_URL
        sync: false # prompted at deploy time — paste the Neon connection string
