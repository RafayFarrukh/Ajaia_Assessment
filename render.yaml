# Render blueprint: one web service + managed Postgres.
# Deploy: push this repo to GitHub → Render Dashboard → New → Blueprint.
services:
  - type: web
    name: ajaia-docs
    runtime: node
    plan: free
    buildCommand: npm install && npx -w server prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ajaia-docs-db
          property: connectionString

databases:
  - name: ajaia-docs-db
    plan: free
